<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f2eb"/>
    </radialGradient>
    
    <!-- White Egg Radial Shading -->
    <radialGradient id="whiteEgg1" cx="32%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="65%" stop-color="#f8f6f2"/>
      <stop offset="90%" stop-color="#e3ded6"/>
      <stop offset="100%" stop-color="#cbc4b8"/>
    </radialGradient>
    
    <radialGradient id="whiteEgg2" cx="32%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#faf8f4"/>
      <stop offset="92%" stop-color="#e8e3db"/>
      <stop offset="100%" stop-color="#d3cbbe"/>
    </radialGradient>

    <!-- Pulp Carton Texture Gradient -->
    <linearGradient id="pulpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ded4c5"/>
      <stop offset="50%" stop-color="#c9bca9"/>
      <stop offset="100%" stop-color="#a89a85"/>
    </linearGradient>

    <linearGradient id="pulpInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b5a693"/>
      <stop offset="100%" stop-color="#8c7d6b"/>
    </linearGradient>

    <!-- Feature Bar Gradient -->
    <linearGradient id="featureBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f2aa34"/>
      <stop offset="100%" stop-color="#e59818"/>
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="cartonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#2c2217" flood-opacity="0.2"/>
    </filter>
    
    <filter id="eggShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="6" stdDeviation="4" flood-color="#3a2e20" flood-opacity="0.22"/>
    </filter>
    
    <filter id="barShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f766e" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Clean Background -->
  <rect width="800" height="650" fill="url(#bgGrad)"/>

  <!-- Ground Shadow -->
  <ellipse cx="400" cy="460" rx="340" ry="40" fill="#2a1f13" opacity="0.12"/>

  <!-- Molded Pulp Carton Box (Open Lid & Base in Perspective) -->
  <g filter="url(#cartonShadow)">
    <!-- Open Top Lid (Angled Backwards) -->
    <path d="M 120,200 L 250,70 L 670,120 L 580,240 Z" fill="url(#pulpGrad)"/>
    <path d="M 120,200 L 250,70 L 670,120 L 580,240 Z" stroke="#8c7d6b" stroke-width="3" fill="none"/>
    <rect x="220" y="140" width="35" height="25" rx="3" fill="#8c7d6b" opacity="0.5" transform="rotate(-15 220 140)"/>
    <rect x="520" y="170" width="35" height="25" rx="3" fill="#8c7d6b" opacity="0.5" transform="rotate(-15 520 170)"/>

    <!-- Bottom Tray Container Base -->
    <path d="M 140,230 L 680,220 L 730,380 L 190,440 Z" fill="url(#pulpGrad)"/>

    <!-- Inner Cells & Divider Cones -->
    <path d="M 170,250 C 200,250 200,320 170,320 C 140,320 140,250 170,250 Z" fill="url(#pulpInner)"/>
    <path d="M 270,250 C 300,250 300,320 270,320 C 240,320 240,250 270,250 Z" fill="url(#pulpInner)"/>
    <path d="M 370,250 C 400,250 400,320 370,320 C 340,320 340,250 370,250 Z" fill="url(#pulpInner)"/>
    <path d="M 470,250 C 500,250 500,320 470,320 C 440,320 440,250 470,250 Z" fill="url(#pulpInner)"/>
    <path d="M 570,250 C 600,250 600,320 570,320 C 540,320 540,250 570,250 Z" fill="url(#pulpInner)"/>

    <path d="M 220,330 C 250,330 250,400 220,400 C 190,400 190,330 220,330 Z" fill="url(#pulpInner)"/>
    <path d="M 320,330 C 350,330 350,400 320,400 C 290,400 290,330 320,330 Z" fill="url(#pulpInner)"/>
    <path d="M 420,330 C 450,330 450,400 420,400 C 390,400 390,330 420,330 Z" fill="url(#pulpInner)"/>
    <path d="M 520,330 C 550,330 550,400 520,400 C 490,400 490,330 520,330 Z" fill="url(#pulpInner)"/>
    <path d="M 620,330 C 650,330 650,400 620,400 C 590,400 590,330 620,330 Z" fill="url(#pulpInner)"/>
  </g>

  <!-- 10 Pristine White Eggs Inside Carton Cells -->
  <g filter="url(#eggShadow)">
    <!-- Back Row of 5 White Eggs -->
    <ellipse cx="230" cy="230" rx="42" ry="58" fill="url(#whiteEgg1)" transform="rotate(-6 230 230)"/>
    <ellipse cx="330" cy="225" rx="43" ry="59" fill="url(#whiteEgg2)" transform="rotate(2 330 225)"/>
    <ellipse cx="430" cy="225" rx="44" ry="60" fill="url(#whiteEgg1)" transform="rotate(-4 430 225)"/>
    <ellipse cx="530" cy="230" rx="43" ry="59" fill="url(#whiteEgg2)" transform="rotate(5 530 230)"/>
    <ellipse cx="630" cy="235" rx="42" ry="58" fill="url(#whiteEgg1)" transform="rotate(-3 630 235)"/>

    <!-- Front Row of 5 White Eggs -->
    <ellipse cx="270" cy="310" rx="48" ry="66" fill="url(#whiteEgg2)" transform="rotate(-8 270 310)"/>
    <ellipse cx="370" cy="300" rx="50" ry="68" fill="url(#whiteEgg1)" transform="rotate(3 370 300)"/>
    <ellipse cx="470" cy="300" rx="50" ry="68" fill="url(#whiteEgg2)" transform="rotate(-2 470 300)"/>
    <ellipse cx="570" cy="305" rx="49" ry="67" fill="url(#whiteEgg1)" transform="rotate(6 570 305)"/>
    <ellipse cx="665" cy="315" rx="47" ry="64" fill="url(#whiteEgg2)" transform="rotate(-5 665 315)"/>
    
    <!-- Brand Stamp on Center White Egg -->
    <text x="365" y="300" font-family="sans-serif" font-size="8.5" font-weight="bold" fill="#0f766e" opacity="0.75" transform="rotate(3 370 300)">SAMARTH</text>
    <text x="365" y="311" font-family="sans-serif" font-size="7.5" fill="#0f766e" opacity="0.75" transform="rotate(3 370 300)">WHITE</text>
  </g>

  <!-- Molded Pulp Front Lip Overlap -->
  <path d="M 190,440 C 350,470 550,450 730,380 L 730,395 C 550,465 350,485 190,455 Z" fill="#8c7d6b"/>

  <!-- Orange Feature Banner Bar (Farm Fresh | Lab-Tested & Safe | Antibiotics & Chemical-Free) -->
  <g transform="translate(70, 490)" filter="url(#barShadow)">
    <rect x="0" y="0" width="660" height="65" rx="32.5" fill="url(#featureBarGrad)"/>
    
    <!-- Section 1 -->
    <text x="90" y="28" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="15" fill="#111111">Farm</text>
    <text x="90" y="47" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="15" fill="#111111">Fresh</text>

    <line x1="180" y1="15" x2="180" y2="50" stroke="#111111" stroke-width="2" opacity="0.3"/>

    <!-- Section 2 -->
    <text x="330" y="28" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="15" fill="#111111">Lab-Tested</text>
    <text x="330" y="47" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="15" fill="#111111">&amp; Safe</text>

    <line x1="480" y1="15" x2="480" y2="50" stroke="#111111" stroke-width="2" opacity="0.3"/>

    <!-- Section 3 -->
    <text x="570" y="28" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="14" fill="#111111">Antibiotics &amp;</text>
    <text x="570" y="47" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="14" fill="#111111">Chemical-Free*</text>
  </g>

  <!-- Quality Assurance Footer Text -->
  <text x="400" y="585" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="13" fill="#444444">Tested in accredited labs under FSSAI Standards</text>
  <text x="400" y="608" text-anchor="middle" font-family="sans-serif" font-weight="500" font-size="11" fill="#777777">*Inspected for optimal shell integrity and 100% pure nutrition.</text>
</svg>
